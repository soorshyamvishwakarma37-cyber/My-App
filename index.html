 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="install-banner" class="modal-overlay">
    <div class="glass-modal">
        <h3>Install SewaAstra</h3>
        <p>बेहतर अनुभव के लिए इंस्टॉल करें।</p>
        <div class="modal-btns">
            <button class="btn-sec" onclick="closeModal('install-banner')">बाद में</button>
            <button class="btn-bhagwa" onclick="installApp()">अभी इंस्टॉल करें</button>
        </div>
    </div>
</div>

<div id="exit-modal" class="modal-overlay">
    <div class="glass-modal">
        <h3>Exit SewaAstra?</h3>
        <div class="modal-btns">
            <button class="btn-sec" onclick="closeModal('exit-modal')">नहीं</button>
            <button class="btn-danger" onclick="exitNow()">हाँ</button>
        </div>
    </div>
</div>

<div id="login-layer" class="full-screen-center">
    <button class="btn-bhagwa login-btn" onclick="showScreen('home')">🚀 Login to Dashboard</button>
</div>

<div id="app-content" style="display:none;">
    <header class="bhagwa-header">
        <div class="nav-row">
            <span>☰</span> <b>SewaAstra Home</b> <span onclick="showScreen('profile')">👤</span>
        </div>
    </header>

    <div id="home-section">
        <div class="label">🚩 FINANCE & UTILITY</div> <div class="grid" id="grid-1"></div>
        <div class="label">🎓 EDUCATION & TOOLS</div> <div class="grid" id="grid-2"></div>
        <div class="label">🌟 LIFESTYLE & FOOD</div> <div class="grid" id="grid-3"></div>
    </div>

    <div id="profile-section" style="display:none; text-align:center; padding:40px 20px;">
        <div class="profile-card">
            <img src="https://cdn-icons-png.flaticon.com/128/3135/3135715.png" width="100">
            <h2>Shoorshyam Vishwakarma</h2>
            <p>Founder, SewaAstra</p>
            <button onclick="location.reload()" class="btn-danger" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none;">Logout</button>
        </div>
    </div>

    <div style="height:80px;"></div>
    <footer class="footer-nav">
        <div class="nav-item active" id="nav-home" onclick="showScreen('home')">🏠<span>Home</span></div>
        <div class="nav-item" id="nav-profile" onclick="showScreen('profile')">👤<span>Profile</span></div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
