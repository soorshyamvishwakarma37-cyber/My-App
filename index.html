 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SewaAstra - 110+ Super App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="install-overlay" class="modal-overlay" style="display:none;"><div class="glass-modal"><h2>🚩 SewaAstra Install करें</h2><p>होम स्क्रीन पर जोड़ें</p><div class="modal-btns"><button class="btn-sec" onclick="closeModal('install-overlay')">Later</button><button class="btn-bhagwa" id="btn-real-install">Install</button></div></div></div>
    <div id="exit-modal" class="modal-overlay" style="display:none;"><div class="glass-modal"><h3>Exit App?</h3><div class="modal-btns"><button class="btn-sec" onclick="closeModal('exit-modal')">No</button><button class="btn-danger" onclick="exitNow()">Yes</button></div></div></div>

    <div id="login-layer" class="full-screen-center">
        <div class="auth-card">
            <h1>🚩 SewaAstra</h1>
            <p>Bhopal's Multi-Utility Platform</p><br>
            <button id="btn-login" class="login-btn">Continue with Google</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header class="bhagwa-header">
            <div class="nav-row"><b>SewaAstra</b> <img id="user-photo-nav" src=""></div>
            <input type="text" id="searchBar" placeholder="Search 110+ services..." onkeyup="filterTools()">
        </header>

        <main id="home-section">
            <div class="label" style="color:#FF6600;">🔥 SELF TOOLS (20)</div>
            <div class="grid" id="grid-self"></div>

            <div class="label">💼 GOVT & FINANCE (30)</div>
            <div class="grid" id="grid-govt"></div>

            <div class="label">🎓 EDUCATION & TECH (30)</div>
            <div class="grid" id="grid-edu"></div>

            <div class="label">🍕 FOOD & LIFESTYLE (30)</div>
            <div class="grid" id="grid-life"></div>
        </main>

        <footer class="footer-nav">
            <div class="nav-item active">🏠<span>Home</span></div>
            <div class="nav-item" onclick="logout()">🚪<span>Logout</span></div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
