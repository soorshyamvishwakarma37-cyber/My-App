 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SewaAstra Super App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="exit-modal" class="modal-overlay" style="display: none;">
        <div class="glass-modal">
            <h3>Exit SewaAstra?</h3>
            <div class="modal-btns">
                <button class="btn-sec" onclick="closeModal('exit-modal')">No</button>
                <button class="btn-danger" onclick="exitNow()">Yes</button>
            </div>
        </div>
    </div>

    <div id="login-layer" class="full-screen-center">
        <div class="auth-card">
            <div style="font-size: 50px;">🚩</div>
            <h1 style="font-weight: 900; margin-bottom: 20px;">SewaAstra</h1>
            
            <div id="auth-inputs">
                <input type="email" id="user-email" class="input-box" placeholder="Email ID">
                <input type="password" id="user-pass" class="input-box" placeholder="Password">
                
                <button onclick="handleLogin()" class="btn-bhagwa main-btn">Login Now</button>
                <button onclick="handleSignup()" class="btn-sec main-btn" style="margin-top:10px;">Create New Account</button>
            </div>
            <p id="auth-error" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header class="bhagwa-header">
            <div class="nav-row">
                <span>☰</span> <b>SewaAstra</b> 
                <div id="profile-icon">S</div>
            </div>
            <input type="text" id="searchBar" placeholder="Search 110+ services..." onkeyup="filterTools()">
        </header>

        <main id="home-section">
            <div class="label" style="color:#FF6600;">🔥 EXCLUSIVE TOOLS (20)</div>
            <div class="grid" id="grid-self"></div>

            <div class="label">💼 GOVT & DOCUMENTS (30)</div>
            <div class="grid" id="grid-govt"></div>

            <div class="label">🎓 EDUCATION & TECH (30)</div>
            <div class="grid" id="grid-edu"></div>

            <div class="label">🍕 LIFESTYLE & FOOD (30)</div>
            <div class="grid" id="grid-life"></div>
        </main>

        <footer class="footer-nav">
            <div class="nav-item active">🏠<span>Home</span></div>
            <div class="nav-item" onclick="logout()">🚪<span>Logout</span></div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
